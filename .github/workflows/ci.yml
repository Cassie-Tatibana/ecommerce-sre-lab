name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/

      - name: Build Docker images
        run: docker compose build

  smoke-tests:
    runs-on: ubuntu-latest
    needs: test-and-build
    env:
      GRAFANA_URL: http://127.0.0.1:3000
      GRAFANA_USERNAME: admin
      GRAFANA_PASSWORD: ecommerce-admin

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install Playwright dependencies
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for Grafana
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "$GRAFANA_URL/api/health" >/dev/null \
              && curl -fsS -u "$GRAFANA_USERNAME:$GRAFANA_PASSWORD" \
                "$GRAFANA_URL/api/dashboards/uid/ecommerce-overview" >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Grafana dashboard did not become ready in time"
          exit 1

      - name: Run Playwright smoke tests
        run: npm run smoke

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down -v
